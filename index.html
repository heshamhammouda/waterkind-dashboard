<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waterkind — Daily Operations Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root {
  --bg:#f7f6f3;--surface:#fff;--border:rgba(0,0,0,0.08);--text:#181816;--muted:#72716b;--hint:#a9a8a1;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-t:#3B6D11;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-t:#854F0B;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-t:#A32D2D;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-t:#185FA5;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-t:#3C3489;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1b1b19;--surface:#242422;--border:rgba(255,255,255,0.09);--text:#e6e4dd;--muted:#a9a8a1;--hint:#72716b;
  --green-bg:#085041;--green-t:#9FE1CB;--amber-bg:#633806;--amber-t:#FAC775;
  --red-bg:#791F1F;--red-t:#F7C1C1;--blue-bg:#0C447C;--blue-t:#B5D4F4;--purple-bg:#3C3489;--purple-t:#CECBF6;}
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ── UPLOAD ── */
#upload-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.up-title{font-size:22px;font-weight:600;margin-bottom:6px;text-align:center}
.up-sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:2rem}
.drop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:720px;margin-bottom:1.5rem}
@media(max-width:600px){.drop-grid{grid-template-columns:1fr}}
.dz{border:1.5px dashed var(--border);border-radius:var(--rl);padding:1.5rem 1rem;text-align:center;cursor:pointer;background:var(--surface);transition:border-color .15s,background .15s}
.dz:hover,.dz.over{border-color:var(--blue);background:var(--blue-bg)}
.dz.ok{border-color:var(--green);background:var(--green-bg)}
.dz-ico{font-size:26px;margin-bottom:8px}
.dz-name{font-size:13px;font-weight:600;margin-bottom:4px}
.dz-hint{font-size:11px;color:var(--muted)}
.dz.ok .dz-hint{color:var(--green-t);font-weight:500}
.go-btn{background:var(--text);color:var(--bg);border:none;border-radius:var(--r);padding:11px 32px;font-size:14px;font-weight:600;cursor:pointer;opacity:.35;transition:opacity .15s;pointer-events:none}
.go-btn.ready{opacity:1;pointer-events:auto}
.go-btn.ready:hover{opacity:.82}

/* ── SHELL ── */
#dash{display:none}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:200}
.tb-brand{font-size:15px;font-weight:700;letter-spacing:-.2px}
.tb-meta{font-size:12px;color:var(--muted);margin-left:12px}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{font-size:12px;color:var(--blue-t);background:var(--blue-bg);border:none;border-radius:6px;padding:4px 10px;cursor:pointer}
.nav{display:flex;gap:0;background:var(--surface);border-bottom:.5px solid var(--border);padding:0 1.25rem;overflow-x:auto}
.nt{padding:9px 15px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;transition:color .1s}
.nt.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
.nt:hover:not(.active){color:var(--text)}
.page{display:none;padding:1.25rem;max-width:1080px;margin:0 auto}
.page.active{display:block}

/* ── COMPONENTS ── */
.alerts{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.1rem}
.chip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r);font-size:12px;font-weight:600}
.chip.red{background:var(--red-bg);color:var(--red-t)}
.chip.amber{background:var(--amber-bg);color:var(--amber-t)}
.chip.blue{background:var(--blue-bg);color:var(--blue-t)}
.chip.green{background:var(--green-bg);color:var(--green-t)}

.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:9px;margin-bottom:1.1rem}
.kpi{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:13px 15px}
.kpi-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.kpi-v{font-size:21px;font-weight:700}
.kpi-s{font-size:11px;color:var(--muted);margin-top:2px}
.kpi.g .kpi-v{color:var(--green)}.kpi.a .kpi-v{color:var(--amber)}.kpi.r .kpi-v{color:var(--red)}.kpi.b .kpi-v{color:var(--blue)}.kpi.p .kpi-v{color:var(--purple)}

.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:1rem 1.1rem;margin-bottom:1.1rem}
.st{font-size:13px;font-weight:600;margin-bottom:10px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.1rem}
@media(max-width:580px){.r2{grid-template-columns:1fr}}
.cw{position:relative;width:100%}

table.dt{width:100%;font-size:12px;border-collapse:collapse}
table.dt th{text-align:left;font-weight:600;font-size:11px;color:var(--muted);padding:5px 7px;border-bottom:.5px solid var(--border);white-space:nowrap}
table.dt td{padding:6px 7px;border-bottom:.5px solid var(--border);vertical-align:middle}
table.dt tr:last-child td{border-bottom:none}
table.dt tr:hover td{background:var(--bg)}
.ovx{overflow-x:auto}

.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.badge.g{background:var(--green-bg);color:var(--green-t)}
.badge.a{background:var(--amber-bg);color:var(--amber-t)}
.badge.r{background:var(--red-bg);color:var(--red-t)}
.badge.b{background:var(--blue-bg);color:var(--blue-t)}
.badge.p{background:var(--purple-bg);color:var(--purple-t)}

.hbar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hbl{width:160px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.hbt{flex:1;background:var(--bg);border-radius:4px;height:9px;overflow:hidden}
.hbf{height:100%;border-radius:4px}
.hbv{width:42px;text-align:right;font-size:12px;font-weight:600}

.leg{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px;font-size:12px;color:var(--muted)}
.leg span{display:flex;align-items:center;gap:4px}
.sw{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.empty{color:var(--muted);font-size:13px;padding:1.5rem;text-align:center}

.stale-pill{background:var(--red-bg);color:var(--red-t);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700}
.ok-pill{background:var(--green-bg);color:var(--green-t);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700}
.warn-pill{background:var(--amber-bg);color:var(--amber-t);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700}
</style>
</head>
<body>

<!-- ══ UPLOAD ════════════════════════════════════════════════════════════ -->
<div id="upload-screen">
  <p class="up-title">Waterkind Daily Dashboard</p>
  <p class="up-sub">Drop your 3 daily exports below, then click Load</p>
  <div class="drop-grid">
    <div class="dz" id="dz-shopify" onclick="document.getElementById('fi-shopify').click()" ondragover="dzOver(event,'dz-shopify')" ondragleave="dzOut('dz-shopify')" ondrop="dzDrop(event,'shopify')">
      <div class="dz-ico">🛍</div>
      <div class="dz-name">Shopify Orders</div>
      <div class="dz-hint" id="h-shopify">orders_export.csv</div>
    </div>
    <div class="dz" id="dz-track" onclick="document.getElementById('fi-track').click()" ondragover="dzOver(event,'dz-track')" ondragleave="dzOut('dz-track')" ondrop="dzDrop(event,'track')">
      <div class="dz-ico">📍</div>
      <div class="dz-name">Bosta Tracking</div>
      <div class="dz-hint" id="h-track">Orders_Export_…xlsx</div>
    </div>
    <div class="dz" id="dz-fin" onclick="document.getElementById('fi-fin').click()" ondragover="dzOver(event,'dz-fin')" ondragleave="dzOut('dz-fin')" ondrop="dzDrop(event,'fin')">
      <div class="dz-ico">💰</div>
      <div class="dz-name">Bosta Finance</div>
      <div class="dz-hint" id="h-fin">22-06-2026_…xlsx</div>
    </div>
  </div>
  <input type="file" id="fi-shopify" accept=".csv,.xlsx" style="display:none" onchange="loadFile(event,'shopify')">
  <input type="file" id="fi-track"   accept=".xlsx,.csv" style="display:none" onchange="loadFile(event,'track')">
  <input type="file" id="fi-fin"     accept=".xlsx,.csv" style="display:none" onchange="loadFile(event,'fin')">
  <button class="go-btn" id="go-btn" onclick="build()">Load dashboard →</button>
</div>

<!-- ══ DASHBOARD ═════════════════════════════════════════════════════════ -->
<div id="dash">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <span class="tb-brand">Waterkind</span>
      <span class="tb-meta" id="tb-meta"></span>
    </div>
    <div class="tb-right">
      <button class="tb-btn" onclick="reset()">↩ Load new files</button>
    </div>
  </div>
  <div class="nav">
    <button class="nt active" onclick="show('p-ov',this)">Overview</button>
    <button class="nt" onclick="show('p-live',this)">🔴 Live orders</button>
    <button class="nt" onclick="show('p-sla',this)">SLA</button>
    <button class="nt" onclick="show('p-rev',this)">Revenue</button>
    <button class="nt" onclick="show('p-skus',this)">SKUs</button>
    <button class="nt" onclick="show('p-returns',this)">Returns</button>
    <button class="nt" onclick="show('p-fees',this)">Fees</button>
    <button class="nt" onclick="show('p-peak',this)">Peak times</button>
    <button class="nt" onclick="show('p-cities',this)">Cities</button>
  </div>
  <div id="p-ov"      class="page active"></div>
  <div id="p-live"    class="page"></div>
  <div id="p-sla"     class="page"></div>
  <div id="p-rev"     class="page"></div>
  <div id="p-skus"    class="page"></div>
  <div id="p-returns" class="page"></div>
  <div id="p-fees"    class="page"></div>
  <div id="p-peak"    class="page"></div>
  <div id="p-cities"  class="page"></div>
</div>

<script>
// ══ STATE ════════════════════════════════════════════════════════════════
const D = {shopify:null, track:null, fin:null};
let CH = {};

const SKU = {
  'BO-1962901':'Can Mix A','BO-1962902':'Can Mix B',
  'BO-1759176':'Sachet 30pk','BO-1834623':'Can Single',
  'BO-3150903':'Sparkling 6pk','BO-3798177':'Sparkling 12pk',
  'BO-2085155':'Bundle A','BO-2059749':'Sachet 10pk',
  'BO-4161969':'Bundle B','BO-2059750':'Sachet 5pk',
  'BO-3150557':'Bundle C'
};
const SKUC = ['#378ADD','#1D9E75','#EF9F27','#E24B4A','#7F77DD','#D85A30','#888780','#5DCAA5','#FAC775','#F09595','#B4B2A9'];

// ══ DROP ZONE ═══════════════════════════════════════════════════════════
function dzOver(e,id){e.preventDefault();document.getElementById(id).classList.add('over')}
function dzOut(id){document.getElementById(id).classList.remove('over')}
function dzDrop(e,type){e.preventDefault();dzOut('dz-'+type);processFile(e.dataTransfer.files[0],type)}
function loadFile(e,type){processFile(e.target.files[0],type)}

function processFile(file,type){
  if(!file)return;
  const name=file.name.toLowerCase();
  const reader=new FileReader();
  if(name.endsWith('.csv')){
    reader.onload=e=>{
      const r=Papa.parse(e.target.result,{header:true,skipEmptyLines:true,dynamicTyping:false});
      D[type]=r.data; markLoaded(type,file.name,r.data.length);
    };
    reader.readAsText(file);
  } else {
    reader.onload=e=>{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      D[type]=XLSX.utils.sheet_to_json(ws,{defval:''});
      markLoaded(type,file.name,D[type].length);
    };
    reader.readAsArrayBuffer(file);
  }
}
function markLoaded(type,fname,rows){
  document.getElementById('dz-'+type).classList.add('ok');
  document.getElementById('h-'+type).textContent='✓ '+fname+' ('+rows.toLocaleString()+' rows)';
  if(D.shopify&&D.track&&D.fin)document.getElementById('go-btn').classList.add('ready');
}

// ══ NAV ══════════════════════════════════════════════════════════════════
function show(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}
function reset(){
  document.getElementById('dash').style.display='none';
  document.getElementById('upload-screen').style.display='flex';
  ['shopify','track','fin'].forEach(t=>{
    D[t]=null;
    document.getElementById('dz-'+t).classList.remove('ok');
  });
  document.getElementById('h-shopify').textContent='orders_export.csv';
  document.getElementById('h-track').textContent='Orders_Export_…xlsx';
  document.getElementById('h-fin').textContent='22-06-2026_…xlsx';
  document.getElementById('go-btn').classList.remove('ready');
  Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});
  CH={};
}

// ══ HELPERS ══════════════════════════════════════════════════════════════
const fmt=n=>Number(n).toLocaleString('en-EG',{maximumFractionDigits:0});
const fmtK=n=>n>=1e6?(n/1e6).toFixed(2)+'M':n>=1000?(n/1000).toFixed(1)+'K':Math.round(n).toString();
const pct=(a,b)=>b===0?'—':(a/b*100).toFixed(1)+'%';
const bdg=(t,c)=>`<span class="badge ${c}">${t}</span>`;
function mkC(id,cfg){if(CH[id])CH[id].destroy();const el=document.getElementById(id);if(!el)return;CH[id]=new Chart(el,cfg)}

function parseDate(v){
  if(!v)return null;
  if(v instanceof Date)return isNaN(v)?null:v;
  const s=String(v).trim();
  // Bosta tracking: MM-DD-YYYY, HH:MM:SS
  let m=s.match(/^(\d{2})-(\d{2})-(\d{4}),?\s*(\d{2}):(\d{2}):(\d{2})/);
  if(m)return new Date(+m[3],+m[1]-1,+m[2],+m[4],+m[5],+m[6]);
  // Shopify: YYYY-MM-DD HH:MM:SS +ZZZZ
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})/);
  if(m)return new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5],+m[6]);
  const d=new Date(s);
  return isNaN(d)?null:d;
}
function daysBetween(a,b){if(!a||!b)return null;const d=(b-a)/86400000;return d<0?null:Math.round(d*10)/10}
function monthKey(d){return d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`:null}

function parseSKUs(desc){
  if(!desc)return[];
  const re=/BostaSKU:([\w-]+)\s*-\s*quantity:(\d+)/g;
  const out=[];let m;
  while((m=re.exec(String(desc)))!==null)out.push({sku:m[1],qty:parseInt(m[2])});
  return out;
}
function colorRate(r,hi,lo){return r>=hi?'g':r>=lo?'a':'r'}

// ══ MAIN BUILD ═══════════════════════════════════════════════════════════
function build(){
  if(!D.shopify||!D.track||!D.fin)return;

  /* ── parse Shopify orders ── */
  // Multi-row: one row per line item, group by Name
  const shopMap={};
  D.shopify.forEach(r=>{
    const name=String(r['Name']||'').trim();
    if(!name)return;
    if(!shopMap[name]){
      shopMap[name]={
        name,
        financial:r['Financial Status'],
        fulfillment:r['Fulfillment Status'],
        createdAt:parseDate(r['Created at']),
        cancelledAt:parseDate(r['Cancelled at']),
        total:parseFloat(r['Total'])||0,
        subtotal:parseFloat(r['Subtotal'])||0,
        shipping:parseFloat(r['Shipping'])||0,
        discount:parseFloat(r['Discount Amount'])||0,
        discountCode:r['Discount Code']||'',
        refunded:parseFloat(r['Refunded Amount'])||0,
        paymentMethod:r['Payment Method']||'',
        city:r['Shipping City']||r['Billing City']||'',
        country:r['Shipping Country']||'EG',
        items:[],
        tags:r['Tags']||''
      };
    }
    const sku=String(r['Lineitem sku']||'').trim();
    const qty=parseInt(r['Lineitem quantity'])||0;
    const price=parseFloat(r['Lineitem price'])||0;
    if(sku&&qty>0)shopMap[name].items.push({sku,qty,price,name:r['Lineitem name']||''});
  });
  const shopOrders=Object.values(shopMap);

  /* ── parse Bosta tracking ── */
  D.track.forEach(r=>{
    r._created=parseDate(r['Created At']);
    r._delivered=parseDate(r['Delivered at']);
    r._days=r['Delivery State']==='Delivered'?daysBetween(r._created,r._delivered):null;
    r._skus=parseSKUs(r['Description']);
    r._cod=parseFloat(r['Cod Amount'])||0;
    r._attempts=parseInt(r['Number Of attempts'])||0;
    r._ref=String(r['Business Reference Number']||'').replace(/^wzye3g-0w:/,'').trim();
  });

  /* ── parse Bosta finance ── */
  D.fin.forEach(r=>{
    r._completed=parseDate(r['Completed At']);
    r._cod=parseFloat(r['COD'])||0;
    r._totalFee=parseFloat(r['Total Fees'])||0;
    r._netValue=parseFloat(r['Net Value'])||0;
    r._shippingFee=parseFloat(r['Shipping Fees'])||0;
    r._fulfillFee=parseFloat(r['Fulfillment Fees'])||0;
    r._vat=parseFloat(r['VAT'])||0;
    r._ref=String(r['Order Reference']||'').replace(/^wzye3g-0w:/,'').trim();
  });

  /* ── core metrics ── */
  const T=D.track;
  const F=D.fin;
  const total=T.length;
  const delivered=T.filter(r=>r['Delivery State']==='Delivered');
  const rts=T.filter(r=>r['Delivery State']==='Returned to stock');
  const deleted=T.filter(r=>r['Delivery State']==='Deleted');
  const lost=T.filter(r=>r['Delivery State']==='Lost');
  const inflight=T.filter(r=>['In transit between hubs','Out for delivery','Ready to Dispatch','Created','Received at warehouse'].includes(r['Delivery State']));
  const delRate=delivered.length/total*100;
  const rtoRate=rts.length/total*100;
  const daysArr=delivered.filter(r=>r._days!==null).map(r=>r._days);
  const avgDays=daysArr.length?daysArr.reduce((s,d)=>s+d,0)/daysArr.length:0;
  const breach=delivered.filter(r=>r._days!==null&&r._days>1);
  const breachRate=daysArr.length?breach.length/daysArr.length*100:0;

  const allDates=T.map(r=>r._created).filter(Boolean);
  const maxDate=new Date(Math.max(...allDates));
  const stale=inflight.filter(r=>r._created&&(maxDate-r._created)>86400000);

  const unpaid=F.filter(r=>r['Payment Status']==='Not Paid');
  const unpaidCOD=unpaid.reduce((s,r)=>s+r._cod,0);
  const totalFees=F.reduce((s,r)=>s+r._totalFee,0);
  const totalCOD=F.reduce((s,r)=>s+r._cod,0);
  const totalNet=F.reduce((s,r)=>s+r._netValue,0);
  const cashoutPaid=F.filter(r=>r['Payment Status']==='Paid').reduce((s,r)=>s+r._netValue,0);

  /* ── monthly helpers ── */
  const mLabels=[...new Set(T.map(r=>monthKey(r._created)).filter(Boolean))].sort().slice(-12);
  const mDisp=mLabels.map(m=>{const[y,mo]=m.split('-');return['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+mo]+' '+y.slice(2)});
  function mGroup(arr,dateKey,catFn){
    const map={};mLabels.forEach(m=>map[m]={});
    arr.forEach(r=>{const m=monthKey(r[dateKey]);if(!m||!map[m])return;catFn(map[m],r);});
    return map;
  }

  /* ── shopify revenue monthly ── */
  const activeOrders=shopOrders.filter(o=>!o.cancelledAt);
  const revMap={};mLabels.forEach(m=>revMap[m]={orders:0,revenue:0,cod:0,online:0,discount:0});
  activeOrders.forEach(o=>{
    const m=monthKey(o.createdAt);if(!m||!revMap[m])return;
    revMap[m].orders++;revMap[m].revenue+=o.total;revMap[m].discount+=o.discount;
    if(o.paymentMethod.toLowerCase().includes('cod'))revMap[m].cod+=o.total;
    else revMap[m].online+=o.total;
  });

  document.getElementById('tb-meta').textContent=`${total.toLocaleString()} shipments · ${shopOrders.length.toLocaleString()} orders · as of ${maxDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;

  /* ══════════════════════════════════════════════════════════════
     PAGE: OVERVIEW
  ══════════════════════════════════════════════════════════════ */
  const totalRevenue=activeOrders.reduce((s,o)=>s+o.total,0);

      <div class="kpi a"><div class="kpi-l">Deleted</div><div class="kpi-v">${deleted.length}</div><div class="kpi-s">${fmtK(delCOD)} EGP COD at risk</div></div>
      <div class="kpi r"><div class="kpi-l">Lost</div><div class="kpi-v">${lost.length}</div><div class="kpi-s">file insurance claim</div></div>
      <div class="kpi"><div class="kpi-l">Exception events</div><div class="kpi-v">${fmt(Object.values(excMap).reduce((s,v)=>s+v,0))}</div></div>
    </div>
    <div class="r2">
      <div class="card"><div class="st">Exception reasons</div><div id="exc-bars"></div></div>
      <div><div class="st">Monthly RTO rate</div><div class="cw" style="height:200px"><canvas id="ch-rto-trend"></canvas></div>
        <div class="card" style="margin-top:14px"><div class="st">RTS by city</div>
        <table class="dt"><thead><tr><th>City</th><th>RTS</th><th>RTS rate</th></tr></thead><tbody>
        ${rtsCitySorted.map(([city,n])=>{const ct=T.filter(r=>r['DropOff City']===city&&r['Type']!=='RTO').length;const rate=ct>0?n/ct*100:0;
          return`<tr><td>${city}</td><td>${n}</td><td>${bdg(rate.toFixed(1)+'%',rate<5?'g':rate<15?'a':'r')}</td></tr>`;}).join('')}
        </tbody></table></div>
      </div>
    </div>
    <div class="card"><div class="st">Deleted orders — reconcile with Bosta</div><div class="ovx">
    <table class="dt"><thead><tr><th>Tracking</th><th>Created</th><th>City</th><th>COD (EGP)</th></tr></thead>
    <tbody>${deleted.map(r=>`<tr><td style="font-family:monospace;font-size:11px">${r['Tracking Number']}</td><td style="font-size:11px">${String(r['Created At']).slice(0,10)}</td><td>${r['DropOff City']||'—'}</td><td>${r._cod>0?fmt(r._cod):'—'}</td></tr>`).join('')}
    </tbody></table></div></div>`;

  setTimeout(()=>{
    const mxE=excSorted[0]?.[1]||1;
    const excEl=document.getElementById('exc-bars');
    if(excEl)excEl.innerHTML=excSorted.map(([label,count])=>{
      const short=label.length>50?label.slice(0,50)+'…':label;
      const col=label.includes('refuses')||label.toLowerCase().includes('cancellation')?'#E24B4A':label.includes('address')||label.includes('phone')||label.includes('answering')?'#EF9F27':'#888780';
      return`<div class="hbar"><span class="hbl" title="${label}">${short}</span><div class="hbt"><div class="hbf" style="width:${(count/mxE*100).toFixed(0)}%;background:${col}"></div></div><span class="hbv">${count}</span></div>`;}).join('');
    mkC('ch-rto-trend',{type:'line',data:{labels:mDisp,datasets:[{label:'RTO %',data:mLabels.map(m=>mRTO[m].total>0?mRTO[m].rts/mRTO[m].total*100:null),borderColor:'#E24B4A',backgroundColor:'rgba(226,75,74,.08)',fill:true,tension:.35,pointRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxRotation:0,autoSkip:false}},y:{ticks:{callback:v=>v+'%'}}}}});
  },50);

  /* ══════════════════════════════════════════════════════════════
     PAGE: FEES
  ══════════════════════════════════════════════════════════════ */
  const avgShip=F.reduce((s,r)=>s+r._shippingFee,0)/F.length;
  const avgFul=F.reduce((s,r)=>s+r._fulfillFee,0)/F.length;
  const avgVAT=F.reduce((s,r)=>s+r._vat,0)/F.length;
  const cityFeesMap={};
  F.forEach(r=>{const c=r['Dropoff City']||'Unknown';if(!cityFeesMap[c])cityFeesMap[c]={orders:0,fees:0,cod:0};cityFeesMap[c].orders++;cityFeesMap[c].fees+=r._totalFee;cityFeesMap[c].cod+=r._cod;});
  const cityFeesSorted=Object.entries(cityFeesMap).filter(([,v])=>v.orders>=5).sort((a,b)=>b[1].orders-a[1].orders);

  document.getElementById('p-fees').innerHTML=`
    <div class="kgrid">
      <div class="kpi"><div class="kpi-l">Avg shipping fee</div><div class="kpi-v">${avgShip.toFixed(1)}</div><div class="kpi-s">EGP / order</div></div>
      <div class="kpi"><div class="kpi-l">Avg fulfillment</div><div class="kpi-v">${avgFul.toFixed(1)}</div><div class="kpi-s">EGP / order</div></div>
      <div class="kpi"><div class="kpi-l">Avg VAT</div><div class="kpi-v">${avgVAT.toFixed(1)}</div><div class="kpi-s">EGP / order</div></div>
      <div class="kpi r"><div class="kpi-l">Total fees paid</div><div class="kpi-v">${fmtK(totalFees)}</div><div class="kpi-s">EGP</div></div>
      <div class="kpi g"><div class="kpi-l">Net to Waterkind</div><div class="kpi-v">${fmtK(cashoutPaid)}</div><div class="kpi-s">EGP settled</div></div>
      <div class="kpi a"><div class="kpi-l">Pending cashout</div><div class="kpi-v">${fmtK(unpaidCOD)}</div><div class="kpi-s">${unpaid.length} orders</div></div>
      <div class="kpi"><div class="kpi-l">Fees % of COD</div><div class="kpi-v">${totalCOD>0?pct(totalFees,totalCOD):'—'}</div><div class="kpi-s">blended rate</div></div>
    </div>
    <div class="r2">
      <div><div class="st">Fee composition (avg per order)</div><div class="cw" style="height:230px"><canvas id="ch-fee-donut"></canvas></div></div>
      <div><div class="st">COD collected vs fees vs net</div><div class="cw" style="height:230px"><canvas id="ch-cash-donut"></canvas></div></div>
    </div>
    <div class="card"><div class="st">Fees by city</div><table class="dt">
    <thead><tr><th>City</th><th>Orders</th><th>Avg fee (EGP)</th><th>Total fees</th><th>Fee % of COD</th></tr></thead>
    <tbody>${cityFeesSorted.map(([city,v])=>{const avg=v.fees/v.orders;const fp=v.cod>0?v.fees/v.cod*100:null;
      return`<tr><td>${city}</td><td>${fmt(v.orders)}</td><td>${avg.toFixed(1)}</td><td>${fmtK(v.fees)}</td><td>${fp?bdg(fp.toFixed(1)+'%',fp<25?'g':fp<40?'a':'r'):'<span style="color:var(--muted)">no COD</span>'}</td></tr>`;}).join('')}
    </tbody></table></div>`;

  setTimeout(()=>{
    mkC('ch-fee-donut',{type:'doughnut',data:{labels:[`Shipping ${avgShip.toFixed(1)}`,`Fulfillment ${avgFul.toFixed(1)}`,`VAT ${avgVAT.toFixed(1)}`],
      datasets:[{data:[avgShip,avgFul,avgVAT],backgroundColor:['#378ADD','#1D9E75','#EF9F27'],borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});
    mkC('ch-cash-donut',{type:'doughnut',data:{labels:[`Fees ${fmtK(totalFees)}`,`Net ${fmtK(totalNet)}`],
      datasets:[{data:[totalFees,totalNet],backgroundColor:['#E24B4A','#1D9E75'],borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});
  },50);

  /* ══════════════════════════════════════════════════════════════
     PAGE: PEAK TIMES
  ══════════════════════════════════════════════════════════════ */
  const hourly=new Array(24).fill(0);
  const dowMap={'Mon':0,'Tue':0,'Wed':0,'Thu':0,'Fri':0,'Sat':0,'Sun':0};
  const dowKeys=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dailyMap={};
  T.forEach(r=>{if(!r._created)return;
    hourly[r._created.getHours()]++;
    dowMap[dowKeys[r._created.getDay()]]++;
    const d=r._created.toISOString().slice(0,10);dailyMap[d]=(dailyMap[d]||0)+1;
  });
  const peakH=hourly.indexOf(Math.max(...hourly));
  const peakD=Object.entries(dowMap).sort((a,b)=>b[1]-a[1])[0][0];
  const dailySorted=Object.entries(dailyMap).sort((a,b)=>a[0]<b[0]?-1:1).slice(-60);

  document.getElementById('p-peak').innerHTML=`
    <div class="kgrid">
      <div class="kpi a"><div class="kpi-l">Peak hour</div><div class="kpi-v">${peakH}:00</div><div class="kpi-s">${fmt(hourly[peakH])} orders at this hour</div></div>
      <div class="kpi a"><div class="kpi-l">Peak day</div><div class="kpi-v">${peakD}</div><div class="kpi-s">${fmt(dowMap[peakD])} orders historically</div></div>
      <div class="kpi"><div class="kpi-l">Evening orders (17–22h)</div><div class="kpi-v">${pct(hourly.slice(17,23).reduce((s,v)=>s+v,0),total)}</div></div>
      <div class="kpi"><div class="kpi-l">Late-night (0–4h)</div><div class="kpi-v">${pct(hourly.slice(0,5).reduce((s,v)=>s+v,0),total)}</div></div>
    </div>
    <div class="r2">
      <div><div class="st">Orders by hour</div><div class="cw" style="height:220px"><canvas id="ch-hour"></canvas></div></div>
      <div><div class="st">Orders by day of week</div><div class="cw" style="height:220px"><canvas id="ch-dow"></canvas></div></div>
    </div>
    <div class="st">Daily volume — last 60 days</div>
    <div class="cw" style="height:200px;margin-bottom:1.1rem"><canvas id="ch-daily"></canvas></div>`;

  setTimeout(()=>{
    mkC('ch-hour',{type:'bar',data:{labels:Array.from({length:24},(_,i)=>i+'h'),
      datasets:[{data:hourly,backgroundColor:hourly.map(v=>v===Math.max(...hourly)?'#E24B4A':'#378ADD')}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxRotation:0}}}}});
    mkC('ch-dow',{type:'bar',data:{labels:Object.keys(dowMap),datasets:[{data:Object.values(dowMap),backgroundColor:'#1D9E75'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
    mkC('ch-daily',{type:'line',data:{labels:dailySorted.map(([d])=>d.slice(5)),
      datasets:[{data:dailySorted.map(([,v])=>v),borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,.07)',fill:true,tension:.3,pointRadius:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:12,font:{size:10}}}}}});
  },50);

  /* ══════════════════════════════════════════════════════════════
     PAGE: CITIES
  ══════════════════════════════════════════════════════════════ */
  const cityMap={};
  T.filter(r=>r['Type']!=='RTO').forEach(r=>{
    const c=r['DropOff City']||'Unknown';
    if(!cityMap[c])cityMap[c]={total:0,delivered:0,rts:0,days:[]};
    cityMap[c].total++;
    if(r['Delivery State']==='Delivered')cityMap[c].delivered++;
    if(r['Delivery State']==='Returned to stock')cityMap[c].rts++;
    if(r._days!==null)cityMap[c].days.push(r._days);
  });
  const citySorted=Object.entries(cityMap).filter(([,v])=>v.total>=5).sort((a,b)=>b[1].total-a[1].total);

  document.getElementById('p-cities').innerHTML=`
    <div class="cw" style="height:${Math.max(280,citySorted.slice(0,12).length*36+80)}px;margin-bottom:1.25rem"><canvas id="ch-cities"></canvas></div>
    <div class="card"><div class="st">City breakdown</div><table class="dt">
    <thead><tr><th>City</th><th>Total</th><th>Delivered</th><th>RTS</th><th>Delivery rate</th><th>RTS rate</th><th>Avg days</th></tr></thead>
    <tbody>${citySorted.map(([city,s])=>{
      const dr=s.delivered/s.total*100;const rr=s.rts/s.total*100;
      const avgD=s.days.length?s.days.reduce((a,b)=>a+b,0)/s.days.length:null;
      return`<tr><td>${city}</td><td>${fmt(s.total)}</td><td>${fmt(s.delivered)}</td><td>${fmt(s.rts)}</td>
        <td>${bdg(dr.toFixed(1)+'%',dr>=98?'g':dr>=95?'a':'r')}</td>
        <td>${bdg(rr.toFixed(1)+'%',rr<5?'g':rr<15?'a':'r')}</td>
        <td>${avgD!==null?avgD.toFixed(1)+'d':'—'}</td></tr>`;}).join('')}
    </tbody></table></div>`;

  setTimeout(()=>{
    const top12=citySorted.slice(0,12);
    const rates=top12.map(([,s])=>s.delivered/s.total*100);
    mkC('ch-cities',{type:'bar',data:{labels:top12.map(([c])=>c),
      datasets:[{data:rates,backgroundColor:rates.map(r=>r>=98?'#1D9E75':r>=95?'#EF9F27':'#E24B4A'),indexAxis:'y'}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{min:80,max:101,ticks:{callback:v=>v+'%',font:{size:11}}},y:{ticks:{font:{size:12}}}}}});
  },50);

  /* ── show dashboard ── */
  document.getElementById('upload-screen').style.display='none';
  document.getElementById('dash').style.display='block';
  show('p-ov',document.querySelector('.nt'));
}
</script>
</body>
</html>
